name: Claude Code Review

# Automatically reviews every pull request with Claude. Requires the
# `CLAUDE_CODE_OAUTH_TOKEN` repository secret and the Claude GitHub App installed
# (https://github.com/apps/claude). See README → "Automated reviews".

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  # The action exchanges a GitHub OIDC token to authenticate; without this it
  # fails with "Could not fetch an OIDC token".
  id-token: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request and post concise inline comments for any
            real issues. Prioritize, in order:
              1. Correctness bugs.
              2. Swift 6 strict-concurrency / data-race problems (this package
                 builds in Swift 6 language mode with strict checking).
              3. The reclaimability/safety logic in DiskKit — a false positive
                 that could flag user data as deletable is the worst outcome.
            Skip style nits unless they affect correctness. Always finish with a
            short summary comment — if you found nothing, say it looks good.
          # The default tool allowlist denies the inline-comment tool and Bash,
          # so Claude could review but never post (high permission_denials_count,
          # "No buffered inline comments"). Allow the comment tool + read tools.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*)"
          # Post a durable summary comment even when there are no inline issues.
          use_sticky_comment: true
          classify_inline_comments: false
