name: CI

on:
  push:
    branches: [main]
    tags: ['v*']       # version tags (e.g. v1.0.0) trigger a signed release
  pull_request:        # run on PRs against any base branch (incl. stacked PRs)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    # The package targets .macOS(.v26) and needs a Swift 6.2+ toolchain
    # (Xcode 26), so it must run on a macOS 26 runner image.
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      # Select the latest stable Xcode on the runner. If the default already
      # provides Swift 6.2+, this is a no-op; pinning avoids surprises when the
      # image ships multiple Xcodes.
      - name: Select latest stable Xcode
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          swift --version

      - name: Build
        run: swift build --build-tests -v

      - name: Test
        run: swift test --skip-build

  package:
    name: Package Halo.dmg
    needs: build-test
    # Branch/PR builds get an ad-hoc-signed preview DMG. Tags go through the
    # signed `release` job below instead.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          swift --version

      - name: Build Halo.app and Halo.dmg
        run: make dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Halo-dmg
          path: Halo.dmg
          if-no-files-found: error

  release:
    name: Signed release
    needs: build-test
    # Only on version tags (e.g. v1.0.0), where the signing secrets are trusted.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    permissions:
      contents: write          # create the GitHub Release + attach the DMG

    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          XC="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          swift --version

      # Re-create the Developer ID identity in a throwaway keychain from the
      # base64-encoded .p12 secret so codesign can sign non-interactively.
      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERT_P12 }}
          CERT_PW:  ${{ secrets.DEVID_CERT_PASSWORD }}
          KC_PW:    ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/signing.keychain-db"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PW" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple: -k "$KC_PW" "$KC" >/dev/null
          security list-keychain -d user -s "$KC" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"

      # Sign (via the plugin reading SIGN_IDENTITY) and notarize with the API
      # key passed directly to notarytool.
      - name: Build, sign & notarize Halo.dmg
        env:
          SIGN_IDENTITY:    ${{ secrets.SIGN_IDENTITY }}
          NOTARY_KEY_P8:    ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID:    ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          echo "$NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/key.p8"
          make notarize VERSION="${GITHUB_REF_NAME#v}" NOTARY_ARGS="--key $RUNNER_TEMP/key.p8 --key-id $NOTARY_KEY_ID --issuer $NOTARY_ISSUER_ID"
          rm -f "$RUNNER_TEMP/key.p8"

      # Sparkle appcast: EdDSA-sign the DMG and write the single-item feed.
      # Installed apps poll the stable releases/latest/download/appcast.xml
      # URL, so attaching the feed to each release keeps it always current —
      # no separate hosting. sign_update ships inside the Sparkle SPM artifact
      # fetched by the build above.
      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIGN_UPDATE="$(find .build/artifacts -type f -name sign_update | head -1)"
          ATTRS="$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - Halo.dmg)"
          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Halo</title>
              <item>
                <title>Halo $VERSION</title>
                <link>https://github.com/amir20/Halo.app/releases/tag/$GITHUB_REF_NAME</link>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/amir20/Halo.app/releases/download/$GITHUB_REF_NAME/Halo.dmg"
                  $ATTRS
                  type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF
          cat appcast.xml

      # Publish the notarized DMG + appcast as GitHub Release assets — the
      # stable URLs the Homebrew cask and Sparkle download from.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" Halo.dmg appcast.xml \
            --title "Halo $GITHUB_REF_NAME" \
            --generate-notes
